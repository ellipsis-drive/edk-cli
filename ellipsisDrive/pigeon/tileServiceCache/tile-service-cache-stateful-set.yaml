apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tile-service-cache
  labels:
    ellipsis-drive: tile-service-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      ellipsis-drive: tile-service-cache
  template:
    metadata:
      labels:
        ellipsis-drive: tile-service-cache
    spec:
      containers:
      - name: tile-service-cache
        image: ghcr.io/ellipsis-drive/tile-service-cache:latest
        resources:
          requests:
            cpu: 100m
        env:
          - name: INTERNAL_MAIL
            valueFrom:
              secretKeyRef:
                name: internal-mail
                key: username
          - name: INTERNAL_MAIL_PASS
            valueFrom:
              secretKeyRef:
                name: internal-mail
                key: password
        envFrom:
          - configMapRef:
              name: ellipsis
        volumeMounts:
          - name: tile-service-cache
            mountPath: /mnt/tileServiceCache
      imagePullSecrets:
        - name: ghcr-secret

  volumeClaimTemplates:
    - metadata:
        name: tile-service-cache
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ebs-sc
        resources:
          requests:
            storage: 10Gi

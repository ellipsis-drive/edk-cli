apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: rooster
  labels:
    ellipsis-drive: rooster
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18

  storage:
    size: 10Gi
    storageClass: ebs-sc-2

  bootstrap:
    initdb:
      database: ellipsis
      owner: ellipsis_app
      secret:
        name: rooster-db-password
      postInitApplicationSQLRefs:
        configMapRefs:
        - name: rooster-init-database
          key: database.sql
apiVersion: apps/v1
kind: Deployment
metadata:
  name: raster-master
  labels:
    ellipsis-drive: raster-master
spec:
  replicas: 1
  selector:
    matchLabels:
      ellipsis-drive: raster-master
  template:
    metadata:
      labels:
        ellipsis-drive: raster-master
    spec:
      serviceAccountName: cluster-master-service-account
      containers:
      - name: raster-master
        image: ghcr.io/ellipsis-drive/raster-master:latest
        resources:
          requests:
            cpu: 500m
        env:
          - name: POSTGRES_APP_PASS
            valueFrom:
              secretKeyRef:
                name: owl-db-password
                key: password
          - name: MIN_WORKERS
            value: "0"
          - name: MAX_WORKERS
            value: "2"
        envFrom:
          - configMapRef:
              name: ellipsis
        volumeMounts:
          - name: etmpfs
            mountPath: /mnt/etmpfs
      imagePullSecrets:
        - name: dockerconfigjson-github-com
      volumes:
        - name: etmpfs
          persistentVolumeClaim:
            claimName: etmpfs